groups:
  - name: devops_webapp_alerts
    rules:
      - alert: InstanciaCaida
        expr: up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "¡El servicio webapp está CAÍDO!"
          description: "Prometheus no ha podido conectarse a la aplicación Node.js en {{ $labels.instance }} durante más de 30 segundos."
          
      - alert: UsoAltoDeMemoria
        expr: nodejs_heap_space_size_used_bytes > 50000000
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Uso Alto de Memoria (Heap)"
          description: "El contenedor {{ $labels.instance }} está usando más de 50MB de memoria en el Heap de Node.js."

      - alert: AltaCargaCPU
        expr: rate(process_cpu_seconds_total[1m]) > 0.8
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Uso Alto de CPU"
          description: "La CPU de la aplicación ha superado el 80% de consumo por más de 1 minuto."
