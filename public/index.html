<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Status | DevOps Lab</title>
  <link
    href="https://api.fontshare.com/v2/css?f[]=clash-display@400,600,700&f[]=cabinet-grotesk@400,500,800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0c10;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent-glow: #66fcf1;
      --accent-secondary: #45a29e;
      --text-main: #c5c6c7;
      --text-heading: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Cabinet Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Aurora background effect */
    .aurora {
      position: absolute;
      width: 150vw;
      height: 150vh;
      background: radial-gradient(circle at 50% 50%, rgba(69, 162, 158, 0.15), transparent 60%),
        radial-gradient(circle at 80% 20%, rgba(102, 252, 241, 0.1), transparent 50%);
      animation: aurora-move 20s linear infinite alternate;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes aurora-move {
      0% {
        transform: translate(-10%, -10%) rotate(0deg);
      }

      100% {
        transform: translate(10%, 10%) rotate(5deg);
      }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 800px;
      display: grid;
      gap: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-family: 'Clash Display', sans-serif;
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 700;
      color: var(--text-heading);
      letter-spacing: -0.02em;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      border-radius: 100px;
      background: var(--glass-bg);
      border: 1px solid var(--accent-secondary);
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 0.875rem;
      color: var(--accent-glow);
      animation: pulse 2s infinite;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      background-color: var(--accent-glow);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-glow);
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(102, 252, 241, 0.4);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(102, 252, 241, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(102, 252, 241, 0);
      }
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 3rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    .glass-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.05), transparent);
      transform: skewX(-20deg);
      animation: shine 6s infinite;
    }

    @keyframes shine {
      0% {
        left: -100%;
      }

      20% {
        left: 200%;
      }

      100% {
        left: 200%;
      }
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 2rem;
    }

    .info-card {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .info-label {
      font-family: 'Clash Display', sans-serif;
      font-size: 0.875rem;
      color: var(--accent-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .info-value {
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--text-heading);
      word-break: break-all;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--glass-border);
      border-top-color: var(--accent-glow);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="aurora"></div>

  <div class="container">
    <header class="header">
      <h1>DevOps Lab<br>UniSanaba/h1>
        <div class="status-badge">
          <div class="status-indicator"></div>
          System Online
        </div>
    </header>

    <main class="glass-panel">
      <div class="info-grid" id="infoGrid">
        <div class="info-card">
          <span class="info-label">Hostname</span>
          <span class="info-value loading" id="val-hostname"></span>
        </div>
        <div class="info-card">
          <span class="info-label">Platform</span>
          <span class="info-value loading" id="val-platform"></span>
        </div>
        <div class="info-card">
          <span class="info-label">Architecture</span>
          <span class="info-value loading" id="val-arch"></span>
        </div>
        <div class="info-card">
          <span class="info-label">Node Version</span>
          <span class="info-value loading" id="val-node"></span>
        </div>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const response = await fetch('/api/info');
        const data = await response.json();

        const updateField = (id, value) => {
          const el = document.getElementById(`val-${id}`);
          if (el) {
            el.classList.remove('loading');
            el.textContent = value;
          }
        };

        setTimeout(() => {
          updateField('hostname', data.hostname);
          updateField('platform', data.platform);
          updateField('arch', data.architecture);
          updateField('node', data.nodeVersion);
        }, 800);

      } catch (err) {
        console.error('Failed to fetch system info:', err);
        document.getElementById('infoGrid').innerHTML = '<p style="color: #ffc9c9">Error connecting to telemetry service.</p>';
      }
    });
  </script>
</body>

</html>
