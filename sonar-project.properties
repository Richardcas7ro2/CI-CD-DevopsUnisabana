# ============================================================
# Configuración de SonarCloud para el proyecto CI-CD-DevopsUnisabana
# Este archivo define los parámetros que SonarCloud usa para
# analizar la calidad y seguridad del código fuente.
# ============================================================

# Identificador único del proyecto en SonarCloud
sonar.projectKey=Richardcas7ro2_CI-CD-DevopsUnisabana

# Organización en SonarCloud (corresponde al usuario de GitHub)
sonar.organization=richardcas7ro2

# Nombre legible del proyecto (aparece en el dashboard de SonarCloud)
sonar.projectName=CI-CD-DevopsUnisabana

# Directorios donde está el código fuente a analizar
sonar.sources=.

# Archivos y carpetas a excluir del análisis
# Excluimos dependencias, tests y configuraciones que no son código propio
sonar.exclusions=node_modules/**,tests/**,coverage/**,k8s/**,monitoring/**

# Directorio de tests (para que SonarCloud los identifique correctamente)
sonar.tests=tests

# Codificación del código fuente
sonar.sourceEncoding=UTF-8
